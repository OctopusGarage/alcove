version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
