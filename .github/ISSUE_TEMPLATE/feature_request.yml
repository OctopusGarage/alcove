name: Feature request
description: Propose an Alcove capability or workflow improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the expected CLI, MCP, skill, or data-model behavior.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Links, examples, constraints, or alternatives.
