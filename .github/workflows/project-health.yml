name: Project Health

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read
  code-quality: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v6.7.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Documentation and Pages sync coach
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > /tmp/alcove-changed-files.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > /tmp/alcove-changed-files.txt \
              || git diff --name-only HEAD~1 HEAD > /tmp/alcove-changed-files.txt
          fi
          if [[ ! -s /tmp/alcove-changed-files.txt ]]; then
            echo "No changed files detected for documentation sync coach."
            exit 0
          fi
          mapfile -t changed_files < /tmp/alcove-changed-files.txt
          set +e
          scripts/check-docs-drift.sh "${changed_files[@]}"
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            echo "::warning::Documentation or GitHub Pages sync may be stale. Run scripts/check-docs-drift.sh locally and update README/docs/site as needed."
          fi

      - name: Lint and SAST
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Dependency vulnerability scan
        run: uv run pip-audit

      - name: Tests and coverage
        run: uv run pytest

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest
          fail-on-error: false
